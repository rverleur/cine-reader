name: Publish Python Package

on:
  release:
    types:
      - published

jobs:
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          package_version = pyproject["project"]["version"]
          tag_name = os.environ["RELEASE_TAG"]
          normalized_tag = tag_name[1:] if tag_name.startswith("v") else tag_name

          if normalized_tag != package_version:
              raise SystemExit(
                  f"Release tag {tag_name!r} does not match project version {package_version!r}."
              )

          print(f"Validated release tag {tag_name} against project version {package_version}.")
          PY

      - name: Install build and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[dev]

      - name: Run test suite
        run: pytest python/tests -q

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Upload built distributions
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish To PyPI
    if: ${{ !github.event.release.prerelease }}
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/cine-handler/
    permissions:
      id-token: write

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1

  attach-release-assets:
    name: Attach Release Assets
    if: ${{ !github.event.release.prerelease }}
    needs:
      - build
      - publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Upload distributions to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber
